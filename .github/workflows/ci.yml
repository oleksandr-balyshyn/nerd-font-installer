name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.26"
          - stable
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -shuffle=on -coverprofile=coverage.out ./...

      - name: Build
        run: go build -trimpath -o bin/nerdfont-install ./cmd/nerdfont-install

      - name: Smoke test
        run: ./bin/nerdfont-install --config config.example.yaml --dry-run
