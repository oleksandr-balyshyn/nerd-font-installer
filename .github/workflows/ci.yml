name: CI

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    name: Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true
          cache-dependency-path: go.sum

      - name: Check module files
        run: go mod tidy -diff

      - name: Check formatting
        run: |
          files="$(gofmt -l cmd internal)"
          if [ -n "${files}" ]; then
            echo "Go files need formatting:"
            echo "${files}"
            exit 1
          fi

      - name: Run vet
        run: go vet ./...

      - name: Build CLI
        run: go build -trimpath -o /tmp/nerdfont-install ./cmd/nerdfont-install

      - name: Lint GitHub workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true
          cache-dependency-path: go.sum

      - name: Run unit tests
        run: go test -count=1 ./...

  race:
    name: Race
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true
          cache-dependency-path: go.sum

      - name: Run race tests
        run: go test -race -count=1 ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true
          cache-dependency-path: go.sum

      - name: Generate coverage profile
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true
          cache-dependency-path: go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m ./...

  vulnerability:
    name: Vulnerability
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          repo-checkout: false
          go-version-input: "1.26.x"
          go-package: ./...
          cache: true
          cache-dependency-path: go.sum
